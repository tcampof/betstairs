# Render — Web Service con Docker.
#
# Plan GRATUITO: usa Turso (TURSO_DATABASE_URL + TURSO_AUTH_TOKEN).
# Plan STARTER (~7€/mes): puedes usar disco en /app/data en lugar de Turso.
services:
  - type: web
    name: betstairs
    runtime: docker
    plan: free
    healthCheckPath: /login
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_SECRET
        generateValue: true
      # Añade en el panel de Render (Secret):
      # - TURSO_DATABASE_URL
      # - TURSO_AUTH_TOKEN
      # - BOOTSTRAP_USER_EMAIL / BOOTSTRAP_USER_PASSWORD (primer acceso)
      # - ODDS_API_KEY (opcional)

